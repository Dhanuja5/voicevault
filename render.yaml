services:
  - type: web
    name: voicevault
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --timeout 300 --workers 1 server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: WHISPER_MODEL
        value: tiny
      - key: MONGO_URI
        sync: false
